{% extends "base.html" %}
{% block title %}Skillset - 面试储备{% endblock %}
{% block content %}
<div class="container">
    <h1>📚 工具列表</h1>
    {% if tools %}
    <div class="tool-grid">
        {% for t in tools %}
        <a href="{{ t.external_url if t.external_url else url_for('.tool_detail', tool_id=t.id) }}" class="tool-card" {{ 'target=_blank' if t.external_url }}>
            <h2>{{ t.name }}</h2>
            {% if t.description %}<p>{{ t.description }}</p>{% endif %}
        </a>
        {% endfor %}
    </div>
    {% else %}
    <p class="empty">还没有工具，先在数据库中初始化数据。</p>
    {% endif %}
</div>
{% endblock %}

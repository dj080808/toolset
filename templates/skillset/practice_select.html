{% extends "base.html" %}
{% block title %}每日练习 - 选择技术栈{% endblock %}
{% block content %}
<div class="container">
    <a href="{{ url_for('.tool_detail', tool_id=1) }}" class="back-link">← 返回面试储备</a>
    <h1>每日练习</h1>
    <p class="desc">选择要练习的技术栈，系统将随机抽取 10 道面试题。提交后对照答案自评打分。</p>

    <form method="POST" action="{{ url_for('.practice_start') }}" class="practice-form">
        {% for group_name, stacks in grouped.items() %}
        <div class="practice-group">
            <h3>
                <label>
                    <input type="checkbox" class="group-check" data-group="{{ group_name }}">
                    {{ group_name }}
                </label>
            </h3>
            <div class="practice-stacks">
                {% for s in stacks %}
                <label class="practice-stack-label">
                    <input type="checkbox" name="stack_ids" value="{{ s.id }}"
                           class="stack-check" data-group="{{ group_name }}">
                    {{ s.name }}
                </label>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-lg">开始练习 (随机 10 题)</button>
    </form>
</div>

<script>
document.querySelectorAll('.group-check').forEach(gcb => {
    gcb.addEventListener('change', function() {
        const group = this.dataset.group;
        document.querySelectorAll('.stack-check[data-group="' + group + '"]').forEach(sc => {
            sc.checked = this.checked;
        });
    });
});
</script>

<style>
.practice-form { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.practice-group { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #eee; }
.practice-group h3 { font-size: 16px; margin-bottom: 8px; }
.practice-group h3 label { cursor: pointer; }
.practice-stacks { display: flex; flex-wrap: wrap; gap: 6px; }
.practice-stack-label { display: inline-block; padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background .2s; user-select: none; }
.practice-stack-label:has(input:checked) { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; font-weight: 500; }
.practice-stack-label input { display: none; }
.btn-lg { padding: 12px 32px; font-size: 16px; margin-top: 16px; }
</style>
{% endblock %}

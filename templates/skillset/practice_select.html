{% extends "base.html" %}
{% block title %}每日练习 - 选择技术栈{% endblock %}
{% block content %}
<div class="container">
    <a href="{{ url_for('.tool_detail', tool_id=1) }}" class="back-link">← 返回面试储备</a>
    <h1>每日练习</h1>
    <p class="desc">选择要练习的技术栈，系统将随机抽取 10 道面试题。提交后对照答案自评打分。</p>

    <form method="POST" action="{{ url_for('.practice_start') }}" class="practice-form">
        {% for group_name, stacks in grouped.items() %}
        <div class="practice-group">
            <h3>
                <label>
                    <input type="checkbox" class="group-check" data-group="{{ group_name }}">
                    {{ group_name }}
                </label>
            </h3>
            <div class="practice-stacks">
                {% for s in stacks %}
                <label class="practice-stack-label">
                    <input type="checkbox" name="stack_ids" value="{{ s.id }}"
                           class="stack-check" data-group="{{ group_name }}">
                    {{ s.name }}
                </label>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-lg">开始练习 (随机 10 题)</button>
    </form>
</div>

<div id="saved-note" style="display:none; background:#e8f0fe; border-radius:8px; padding:10px 16px; margin-bottom:16px; font-size:14px; color:#1a73e8;">
    已加载上次的选择。<a href="#" onclick="clearSaved();return false" style="color:#c5221f;margin-left:12px;">清除选择</a>
</div>

<script>
const STORAGE_KEY = 'practice_selection';

// Load saved selection
function loadSaved() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    try {
        const ids = JSON.parse(saved);
        if (!ids.length) return;
        ids.forEach(id => {
            const cb = document.querySelector('.stack-check[value="' + id + '"]');
            if (cb) cb.checked = true;
        });
        // Sync group checkboxes
        document.querySelectorAll('.group-check').forEach(gcb => {
            const group = gcb.dataset.group;
            const stacks = document.querySelectorAll('.stack-check[data-group="' + group + '"]');
            gcb.checked = stacks.length > 0 && Array.from(stacks).every(s => s.checked);
        });
        document.getElementById('saved-note').style.display = 'block';
    } catch(e) {}
}

// Save selection on submit
document.querySelector('.practice-form').addEventListener('submit', function() {
    const checked = Array.from(document.querySelectorAll('.stack-check:checked')).map(cb => parseInt(cb.value));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
});

function clearSaved() {
    localStorage.removeItem(STORAGE_KEY);
    document.querySelectorAll('.stack-check').forEach(cb => cb.checked = false);
    document.querySelectorAll('.group-check').forEach(cb => cb.checked = false);
    document.getElementById('saved-note').style.display = 'none';
}

// Group toggle
document.querySelectorAll('.group-check').forEach(gcb => {
    gcb.addEventListener('change', function() {
        const group = this.dataset.group;
        document.querySelectorAll('.stack-check[data-group="' + group + '"]').forEach(sc => {
            sc.checked = this.checked;
        });
    });
});

// Individual stack toggle updates group checkbox
document.querySelectorAll('.stack-check').forEach(sc => {
    sc.addEventListener('change', function() {
        const group = this.dataset.group;
        const stacks = document.querySelectorAll('.stack-check[data-group="' + group + '"]');
        const gcb = document.querySelector('.group-check[data-group="' + group + '"]');
        if (gcb) gcb.checked = Array.from(stacks).every(s => s.checked);
    });
});

loadSaved();
</script>

<style>
.practice-form { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.practice-group { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #eee; }
.practice-group h3 { font-size: 16px; margin-bottom: 8px; }
.practice-group h3 label { cursor: pointer; }
.practice-stacks { display: flex; flex-wrap: wrap; gap: 6px; }
.practice-stack-label { display: inline-block; padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background .2s; user-select: none; }
.practice-stack-label:has(input:checked) { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; font-weight: 500; }
.practice-stack-label input { display: none; }
.btn-lg { padding: 12px 32px; font-size: 16px; margin-top: 16px; }
</style>
{% endblock %}
